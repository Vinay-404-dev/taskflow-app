<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Task Manager</title>
  <meta name="description" content="A simple and elegant task manager to organize your daily work." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Background orbs -->
  <div class="bg-orb orb-1"></div>
  <div class="bg-orb orb-2"></div>
  <div class="bg-orb orb-3"></div>

  <div class="app-wrapper">
    <!-- Header -->
    <header class="header">
      <div class="header-inner">
        <div class="logo">
          <span class="logo-icon">✦</span>
          <h1>TaskFlow</h1>
        </div>
        <div class="header-stats">
          <span id="stat-total" class="stat-badge">0 tasks</span>
          <span id="stat-done" class="stat-badge done">0 done</span>
        </div>
      </div>
    </header>

    <main class="main">
      <!-- Add Task Form -->
      <section class="card add-task-card" aria-label="Add new task">
        <h2 class="card-title">
          <span class="card-title-icon">＋</span> New Task
        </h2>
        <form id="task-form" novalidate>
          <div class="form-row">
            <div class="form-field">
              <label for="task-title">Title <span class="required">*</span></label>
              <input
                type="text"
                id="task-title"
                placeholder="What needs to be done?"
                autocomplete="off"
                maxlength="120"
                required
              />
              <span class="field-error" id="title-error"></span>
            </div>
            <div class="form-field">
              <label for="task-description">Description <span class="optional">(optional)</span></label>
              <input
                type="text"
                id="task-description"
                placeholder="Add a short description…"
                autocomplete="off"
                maxlength="300"
              />
            </div>
          </div>
          <button type="submit" id="add-btn" class="btn btn-primary">
            <span class="btn-icon">✦</span> Add Task
          </button>
        </form>
      </section>

      <!-- Filter Tabs -->
      <div class="filter-bar" role="tablist" aria-label="Filter tasks">
        <button class="filter-tab active" data-filter="all" role="tab" id="tab-all">All</button>
        <button class="filter-tab" data-filter="pending" role="tab" id="tab-pending">Pending</button>
        <button class="filter-tab" data-filter="completed" role="tab" id="tab-completed">Completed</button>
      </div>

      <!-- Task List -->
      <section class="task-list-section" aria-label="Task list">
        <div id="task-list" class="task-list"></div>
        <div id="empty-state" class="empty-state hidden">
          <div class="empty-icon">📋</div>
          <p class="empty-title">No tasks here</p>
          <p class="empty-sub">Add your first task above to get started.</p>
        </div>
        <div id="loader" class="loader hidden">
          <div class="spinner"></div>
        </div>
      </section>
    </main>
  </div>

  <!-- Toast Notifications -->
  <div id="toast-container" class="toast-container" aria-live="polite"></div>

  <!-- Edit Modal -->
  <div id="edit-modal" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal-card">
      <div class="modal-header">
        <h2 id="modal-title">Edit Task</h2>
        <button class="modal-close" id="modal-close" aria-label="Close modal">✕</button>
      </div>
      <form id="edit-form">
        <div class="form-field">
          <label for="edit-title">Title <span class="required">*</span></label>
          <input type="text" id="edit-title" maxlength="120" required />
          <span class="field-error" id="edit-title-error"></span>
        </div>
        <div class="form-field">
          <label for="edit-description">Description</label>
          <input type="text" id="edit-description" maxlength="300" />
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-ghost" id="cancel-edit">Cancel</button>
          <button type="submit" class="btn btn-primary">Save Changes</button>
        </div>
      </form>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
